<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticeboard — The Adventurer's Emporium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --void:#0d0618;--arcane-border:#6b3fa0;
  --crystal:#c8a8f8;--crystal-bright:#e8d8ff;--crystal-dim:#8a68c8;
  --gold:#f0c848;--gold-dim:#a88020;--silver:#d0c8e8;--silver-dim:#9890b8;
  --teal:#40d8c8;--red:#ff4488;--green:#60c870;--amber:#f0a030;
  --bg-card:rgba(29,12,56,0.95);--bg-input:rgba(13,6,24,0.8);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--void);background-image:radial-gradient(ellipse 80% 50% at 50% 0%,#2d1054 0%,transparent 70%);min-height:100vh;font-family:'Crimson Pro',Georgia,serif;color:var(--silver);}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) var(--dl,0s) infinite alternate ease-in-out;}
@keyframes twinkle{from{opacity:.08;}to{opacity:.85;}}
.page{position:relative;z-index:1;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.auth-card{background:var(--bg-card);border:1px solid var(--arcane-border);border-radius:8px;padding:2.5rem;width:100%;max-width:400px;position:relative;}
.auth-card::before{content:'';position:absolute;inset:5px;border:1px solid rgba(107,63,160,.18);border-radius:5px;pointer-events:none;}
.auth-logo{text-align:center;margin-bottom:1.8rem;}
.auth-logo h1{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;color:var(--crystal-bright);line-height:1.2;}
.auth-logo h1 span{color:var(--gold);}
.auth-logo p{font-style:italic;color:var(--crystal-dim);font-size:.88rem;margin-top:.4rem;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.5rem;background:rgba(13,6,24,.85);border-bottom:1px solid rgba(107,63,160,.35);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;}
.topbar-brand{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;color:var(--crystal-bright);}
.topbar-brand span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:.7rem;}

/* LAYOUT */
.main{max-width:800px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.page-header{margin-bottom:1.8rem;}
.page-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:var(--crystal-bright);margin-bottom:.3rem;}
.page-sub{font-style:italic;color:var(--crystal-dim);font-size:.9rem;}

/* NOTICES */
.pinned-notice{background:linear-gradient(135deg,rgba(240,200,72,.06),rgba(107,63,160,.12));border:2px solid rgba(240,200,72,.4);border-radius:8px;padding:1.4rem 1.6rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.pinned-notice::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(240,200,72,.04),transparent);animation:shimmer 5s linear infinite;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%)}}
.pin-icon{font-family:'Cinzel',serif;font-size:.62rem;font-weight:600;letter-spacing:.1em;color:var(--gold);border:1px solid rgba(240,200,72,.4);padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:.6rem;}
.notice-title{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:600;color:var(--crystal-bright);margin-bottom:.45rem;}
.notice-body{font-size:.95rem;color:var(--silver);line-height:1.75;}
.notice-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;flex-wrap:wrap;gap:.4rem;}
.notice-date{font-size:.73rem;color:var(--silver-dim);}
.notice-author{font-size:.73rem;color:var(--crystal-dim);font-family:'Cinzel',serif;}
.notice-card{background:var(--bg-card);border:1px solid rgba(107,63,160,.3);border-radius:6px;padding:1.2rem 1.4rem;margin-bottom:.8rem;transition:border-color .2s;}
.notice-card:hover{border-color:var(--arcane-border);}
.notice-card.warn{border-color:rgba(240,160,48,.35);}
.notice-card.info{border-color:rgba(64,216,200,.25);}
.notice-card.event{border-color:rgba(107,63,160,.5);}
.type-pill{display:inline-block;font-family:'Cinzel',serif;font-size:.6rem;font-weight:600;letter-spacing:.1em;padding:2px 8px;border-radius:3px;border:1px solid;margin-bottom:.5rem;}
.type-announcement{border-color:var(--crystal-dim);color:var(--crystal-dim);}
.type-warning{border-color:var(--amber);color:var(--amber);}
.type-info{border-color:var(--teal);color:var(--teal);}
.type-event{border-color:var(--crystal);color:var(--crystal);}

/* DM POST FORM */
.post-form{background:rgba(107,63,160,.06);border:1px solid rgba(107,63,160,.25);border-radius:6px;padding:1.4rem 1.6rem;margin-bottom:1.5rem;}
.post-form-title{font-family:'Cinzel',serif;font-size:.85rem;font-weight:600;color:var(--crystal-bright);margin-bottom:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.form-group{margin-bottom:.8rem;}
.form-label{display:block;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:var(--crystal-dim);margin-bottom:.3rem;text-transform:uppercase;}
.form-input{width:100%;background:var(--bg-input);border:1px solid rgba(107,63,160,.4);border-radius:4px;padding:.52rem .8rem;color:var(--crystal-bright);font-family:'Crimson Pro',serif;font-size:.95rem;outline:none;}
.form-input:focus{border-color:var(--crystal-dim);}
textarea.form-input{resize:vertical;min-height:80px;}

/* BUTTONS */
.btn{font-family:'Cinzel',serif;font-size:.73rem;font-weight:600;letter-spacing:.08em;padding:.48rem 1.1rem;border-radius:4px;cursor:pointer;transition:all .2s;border:1px solid;display:inline-flex;align-items:center;gap:.3rem;}
.btn-primary{background:rgba(107,63,160,.3);border-color:var(--arcane-border);color:var(--crystal-bright);}
.btn-primary:hover{background:rgba(107,63,160,.5);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:rgba(240,200,72,.15);border-color:var(--gold-dim);color:var(--gold);}
.btn-gold:hover{background:rgba(240,200,72,.28);}
.btn-danger{background:rgba(255,68,136,.1);border-color:#c03060;color:var(--red);}
.btn-danger:hover{background:rgba(255,68,136,.22);}
.btn-sm{padding:.28rem .7rem;font-size:.66rem;}

/* MISC */
.spinner{width:28px;height:28px;border:2px solid rgba(107,63,160,.3);border-top-color:var(--crystal-dim);border-radius:50%;animation:spin .8s linear infinite;margin:2rem auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:2.5rem;color:var(--silver-dim);font-style:italic;}
.section-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;color:var(--crystal-dim);}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:rgba(107,63,160,.25);}
.form-error{font-size:.78rem;color:var(--red);margin-bottom:.6rem;}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;display:flex;flex-direction:column;gap:.5rem;}
.toast{background:var(--bg-card);border:1px solid;border-radius:5px;padding:.65rem 1rem;font-size:.85rem;min-width:200px;animation:toast-in .25s ease;}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.toast-success{border-color:var(--green);color:var(--green);}
.toast-error{border-color:var(--red);color:var(--red);}
.toast-info{border-color:var(--crystal-dim);color:var(--crystal);}
</style>
</head>
<body>
<div id="stars"></div>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>The Adventurer's<br><span>Emporium</span></h1>
      <p>Sign in to view the noticeboard</p>
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="login-user" type="text" placeholder="Your username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <p class="form-error" id="login-err" style="display:none;margin-bottom:.6rem;"></p>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()" style="width:100%;margin-top:.4rem;justify-content:center;">Sign In →</button>
    <div style="display:flex;justify-content:space-between;margin-top:1rem;flex-wrap:wrap;gap:.5rem;">
      <a href="register.html" style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--crystal-dim);text-decoration:none;">Request account</a>
      <a href="index.html"    style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--crystal-dim);text-decoration:none;">← Back to Emporium</a>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-app" style="display:none">
<div class="page">

  <div class="topbar">
    <div class="topbar-brand">Mr. <span>Smith's</span> Emporium</div>
    <div class="topbar-right">
      <span id="topbar-user" style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--crystal-dim);"></span>
      <button class="btn btn-sm btn-primary" onclick="doSignOut()">Sign Out</button>
      <a href="shop_portal.html" style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--crystal-dim);text-decoration:none;border:1px solid rgba(107,63,160,.3);padding:.28rem .7rem;border-radius:4px;">Portal</a>
      <a href="index.html" style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--crystal-dim);text-decoration:none;border:1px solid rgba(107,63,160,.3);padding:.28rem .7rem;border-radius:4px;">&#8592; Home</a>
    </div>
  </div>

  <div class="main">

    <div class="page-header">
      <div class="page-title">&#128196; Noticeboard</div>
      <div class="page-sub">Announcements, reminders, and session news from your DM</div>
    </div>

    <!-- DM POST FORM (only visible to DMs) -->
    <div id="dm-post-form" style="display:none">
      <div class="post-form">
        <div class="post-form-title">&#9998; Post a Notice</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Title</label>
            <input class="form-input" id="new-title" type="text" maxlength="80" placeholder="Notice title">
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-input" id="new-type">
              <option value="announcement">Announcement</option>
              <option value="event">Event</option>
              <option value="info">Info</option>
              <option value="warning">Warning</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea class="form-input" id="new-body" rows="4" placeholder="Write your notice here..."></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;color:var(--crystal-dim);cursor:pointer;">
            <input type="checkbox" id="new-pinned"> PIN TO TOP
          </label>
          <p class="form-error" id="post-err" style="display:none;margin:0;"></p>
          <button class="btn btn-gold" onclick="postNotice()">Post Notice</button>
        </div>
      </div>
    </div>

    <!-- PINNED NOTICES -->
    <div id="pinned-wrap"></div>

    <div class="section-divider">&#10022; &nbsp; LATEST NOTICES &nbsp; &#10022;</div>

    <!-- REGULAR NOTICES -->
    <div id="notices-wrap">
      <div class="spinner"></div>
    </div>

  </div>
</div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const firebaseConfig = {
  apiKey:'AIzaSyAWpUnUirhcI3nhW9WF_7aqDInOCvIbsIY',
  authDomain:'jcca-dnd.firebaseapp.com',
  projectId:'jcca-dnd',
  storageBucket:'jcca-dnd.firebasestorage.app',
  messagingSenderId:'128758977152',
  appId:'1:128758977152:web:f43ef158eedf82614ccc65',
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const HASH_ITERATIONS = 200000;

async function verifyPassword(password, stored) {
  const enc=new TextEncoder(), [saltB64,hashB64]=stored.split(':');
  const fromB64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:fromB64(saltB64),iterations:HASH_ITERATIONS,hash:'SHA-256'},key,256);
  return btoa(String.fromCharCode(...new Uint8Array(bits)))===hashB64;
}

let loggedInUsername = null;
let loggedInRole     = null;
let loggedInName     = null;

// ================================================================
//  BOOT
// ================================================================
async function boot() {
  makeStars();
  try { await auth.signInAnonymously(); } catch(e) { console.error(e); }

  // Check session
  const saved = sessionStorage.getItem('dnd_username');
  if (saved) {
    try {
      const doc = await db.collection('Users').doc(saved).get();
      if (doc.exists) {
        const d = doc.data();
        loggedInUsername = saved;
        loggedInRole     = d.role;
        loggedInName     = d.playerName || saved;
        showApp();
        loadNotices();
        return;
      }
    } catch(e) { console.error(e); }
  }

  // Try DM session too
  const savedDM = sessionStorage.getItem('dm_username');
  if (savedDM) {
    try {
      const doc = await db.collection('Users').doc(savedDM).get();
      if (doc.exists && doc.data().role === 'dm') {
        loggedInUsername = savedDM;
        loggedInRole     = 'dm';
        loggedInName     = doc.data().playerName || savedDM;
        showApp();
        loadNotices();
        return;
      }
    } catch(e) { console.error(e); }
  }

  document.getElementById('screen-login').style.display = 'flex';
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('btn-login');
  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const doc = await db.collection('Users').doc(username).get();
    if (!doc.exists) {
      errEl.textContent = 'Username not found.'; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In →'; return;
    }
    const d = doc.data();
    const ok = await verifyPassword(password, d.passwordHash);
    if (!ok) {
      errEl.textContent = 'Incorrect password.'; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In →'; return;
    }
    loggedInUsername = username;
    loggedInRole     = d.role;
    loggedInName     = d.playerName || username;
    // Store in appropriate session key
    if (d.role === 'dm') sessionStorage.setItem('dm_username', username);
    else                  sessionStorage.setItem('dnd_username', username);
    showApp();
    loadNotices();
  } catch(e) {
    console.error(e);
    errEl.textContent = 'Login failed. Please try again.'; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

function doSignOut() {
  sessionStorage.removeItem('dnd_username');
  sessionStorage.removeItem('dm_username');
  loggedInUsername = null;
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
}

function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display   = 'block';
  document.getElementById('topbar-user').textContent = loggedInName;
  if (loggedInRole === 'dm') document.getElementById('dm-post-form').style.display = 'block';
}

// ================================================================
//  NOTICES
// ================================================================
async function loadNotices() {
  try {
    const snap = await db.collection('Notices')
      .orderBy('createdAt', 'desc').get();
    const notices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPinned(notices.filter(n => n.pinned));
    renderNotices(notices.filter(n => !n.pinned));
  } catch(e) {
    console.error(e);
    document.getElementById('notices-wrap').innerHTML =
      '<p style="color:var(--red);font-size:.85rem;text-align:center;">Failed to load notices.</p>';
  }
}

function renderPinned(notices) {
  const wrap = document.getElementById('pinned-wrap');
  if (!notices.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = notices.map(n => `
    <div class="pinned-notice">
      <div class="pin-icon">&#128204; PINNED</div>
      <div class="notice-title">${esc(n.title)}</div>
      <div class="notice-body">${escNewlines(n.body)}</div>
      <div class="notice-footer">
        <span class="notice-date">${formatDate(n.createdAt)}</span>
        <span class="notice-author">Posted by ${esc(n.authorName||n.authorId)}</span>
        ${loggedInRole==='dm'?`<button class="btn btn-sm btn-danger" onclick="deleteNotice('${n.id}')">&#10005; Delete</button>`:''}
      </div>
    </div>`).join('');
}

function renderNotices(notices) {
  const wrap = document.getElementById('notices-wrap');
  if (!notices.length) {
    wrap.innerHTML = '<div class="empty-state">No notices yet. Check back after your next session!</div>';
    return;
  }
  wrap.innerHTML = notices.map(n => `
    <div class="notice-card ${n.type||''}">
      <span class="type-pill type-${n.type||'announcement'}">${(n.type||'announcement').toUpperCase()}</span>
      <div class="notice-title">${esc(n.title)}</div>
      <div class="notice-body">${escNewlines(n.body)}</div>
      <div class="notice-footer">
        <span class="notice-date">${formatDate(n.createdAt)}</span>
        <span class="notice-author">Posted by ${esc(n.authorName||n.authorId)}</span>
        ${loggedInRole==='dm'?`<button class="btn btn-sm btn-danger" onclick="deleteNotice('${n.id}')">&#10005; Delete</button>`:''}
      </div>
    </div>`).join('');
}

async function postNotice() {
  const title  = document.getElementById('new-title').value.trim();
  const body   = document.getElementById('new-body').value.trim();
  const type   = document.getElementById('new-type').value;
  const pinned = document.getElementById('new-pinned').checked;
  const errEl  = document.getElementById('post-err');
  errEl.style.display = 'none';

  if (!title || !body) {
    errEl.textContent = 'Please enter a title and message.';
    errEl.style.display = 'block'; return;
  }

  try {
    await db.collection('Notices').add({
      title, body, type, pinned,
      authorId:   loggedInUsername,
      authorName: loggedInName,
      createdAt:  new Date().toISOString(),
    });
    document.getElementById('new-title').value  = '';
    document.getElementById('new-body').value   = '';
    document.getElementById('new-pinned').checked = false;
    toast('Notice posted!', 'success');
    loadNotices();
  } catch(e) {
    console.error(e);
    errEl.textContent = 'Failed to post notice.';
    errEl.style.display = 'block';
  }
}

async function deleteNotice(id) {
  if (!confirm('Delete this notice? This cannot be undone.')) return;
  try {
    await db.collection('Notices').doc(id).delete();
    toast('Notice deleted.', 'info');
    loadNotices();
  } catch(e) { toast('Failed to delete.', 'error'); }
}

// ================================================================
//  UTILS
// ================================================================
function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return iso; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escNewlines(s) { return esc(s).replace(/\n/g,'<br>'); }
function toast(msg,type='info'){const w=document.getElementById('toasts');const el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),4000);}
function makeStars(){const el=document.getElementById('stars');for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.4;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--dl:-${(Math.random()*5).toFixed(1)}s;opacity:${(Math.random()*.4+.08).toFixed(2)}`;el.appendChild(s);}}

boot();
</script>
</body>
</html>
